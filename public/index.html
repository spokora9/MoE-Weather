<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#3b82f6">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="MoE Weather">
  <meta name="description" content="Accurate weather forecasts powered by multiple sources">
  <title>MoE Weather</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌤️</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #3b82f6;
      --primary-dark: #2563eb;
      --bg: #f0f4f8;
      --surface: #ffffff;
      --text: #1a202c;
      --text-secondary: #64748b;
      --border: #e2e8f0;
      --success: #10b981;
      --warning: #f59e0b;
      --error: #ef4444;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    [data-theme="dark"] {
      --bg: #0f172a;
      --surface: #1e293b;
      --text: #f1f5f9;
      --text-secondary: #94a3b8;
      --border: #334155;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      overflow-x: hidden;
    }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding-top: var(--safe-top);
      padding-bottom: var(--safe-bottom);
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior-y: contain;
    }

    /* App Container */
    .app {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* Header - Minimal */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .header-location {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      padding: 8px 12px;
      margin: -8px -12px;
      border-radius: 8px;
      transition: background 0.2s;
    }
    .header-location:active {
      background: var(--bg);
    }
    .header-location-icon { font-size: 18px; }
    .header-location-text {
      font-size: 16px;
      font-weight: 600;
      max-width: 200px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .header-location-arrow {
      font-size: 12px;
      color: var(--text-secondary);
    }
    .header-actions {
      display: flex;
      gap: 4px;
    }
    .header-btn {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: none;
      border-radius: 8px;
      font-size: 20px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .header-btn:active {
      background: var(--bg);
    }

    /* Main Content */
    .main {
      flex: 1;
      padding: 16px;
      overflow-y: auto;
    }

    /* Hero Weather Card */
    .hero {
      background: var(--surface);
      border-radius: 16px;
      padding: 24px 20px;
      text-align: center;
      margin-bottom: 12px;
    }
    .hero-temp-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 8px;
    }
    .hero-icon { font-size: 56px; line-height: 1; }
    .hero-temp { font-size: 64px; font-weight: 700; line-height: 1; }
    .hero-condition {
      font-size: 18px;
      color: var(--text-secondary);
      margin-bottom: 4px;
    }
    .hero-highlow {
      font-size: 15px;
      color: var(--text-secondary);
    }
    .hero-highlow span { margin: 0 6px; }
    .hero-highlow .high { color: var(--text); font-weight: 600; }

    /* Quick Stats Row */
    .quick-stats {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    .quick-stat {
      flex: 1;
      background: var(--surface);
      border-radius: 12px;
      padding: 12px 8px;
      text-align: center;
    }
    .quick-stat-icon { font-size: 20px; margin-bottom: 4px; }
    .quick-stat-value { font-size: 16px; font-weight: 600; }
    .quick-stat-label { font-size: 11px; color: var(--text-secondary); text-transform: uppercase; }

    /* Saved Locations Bar */
    .saved-bar {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 4px 0;
      margin-bottom: 12px;
      scrollbar-width: none;
    }
    .saved-bar::-webkit-scrollbar { display: none; }
    .saved-chip {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    .saved-chip.active {
      background: var(--primary);
      border-color: var(--primary);
      color: white;
    }
    .saved-chip:not(.active):active {
      background: var(--bg);
    }
    .add-location-chip {
      color: var(--primary);
      border-style: dashed;
    }

    /* Section Cards */
    .section {
      background: var(--surface);
      border-radius: 12px;
      margin-bottom: 12px;
      overflow: hidden;
    }
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      cursor: pointer;
      user-select: none;
    }
    .section-header:active {
      background: var(--bg);
    }
    .section-title {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-secondary);
    }
    .section-toggle {
      font-size: 12px;
      color: var(--text-secondary);
      transition: transform 0.2s;
    }
    .section.collapsed .section-toggle {
      transform: rotate(-90deg);
    }
    .section-content {
      padding: 0 16px 16px;
    }
    .section.collapsed .section-content {
      display: none;
    }

    /* Hourly Forecast */
    .hourly-scroll {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      padding: 4px 0;
      margin: 0 -16px;
      padding-left: 16px;
      padding-right: 16px;
      scrollbar-width: none;
    }
    .hourly-scroll::-webkit-scrollbar { display: none; }
    .hourly-item {
      flex-shrink: 0;
      text-align: center;
      padding: 10px 8px;
      background: var(--bg);
      border-radius: 10px;
      min-width: 58px;
    }
    .hourly-time { font-size: 12px; color: var(--text-secondary); margin-bottom: 6px; }
    .hourly-icon { font-size: 22px; margin-bottom: 4px; }
    .hourly-temp { font-size: 14px; font-weight: 600; }

    /* Daily Forecast */
    .daily-list { }
    .daily-item {
      display: flex;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }
    .daily-item:last-child { border-bottom: none; }
    .daily-day { flex: 1; font-size: 14px; font-weight: 500; }
    .daily-icon { font-size: 22px; margin: 0 12px; }
    .daily-temps {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
    }
    .daily-high { font-weight: 600; }
    .daily-low { color: var(--text-secondary); }

    /* Details Grid */
    .details-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }
    .detail-item {
      background: var(--bg);
      border-radius: 10px;
      padding: 12px;
    }
    .detail-label { font-size: 11px; color: var(--text-secondary); text-transform: uppercase; margin-bottom: 4px; }
    .detail-value { font-size: 16px; font-weight: 600; }

    /* Footer Meta */
    .footer-meta {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 16px;
      font-size: 12px;
      color: var(--text-secondary);
    }
    .confidence-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      background: #dcfce7;
      color: #166534;
      border-radius: 12px;
      font-weight: 500;
    }
    [data-theme="dark"] .confidence-badge {
      background: #166534;
      color: #dcfce7;
    }
    .sources-list {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .source-tag {
      padding: 2px 8px;
      background: var(--surface);
      border-radius: 8px;
      font-size: 10px;
      text-transform: uppercase;
    }

    /* Search Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 100;
      opacity: 0;
      visibility: hidden;
      transition: all 0.2s;
    }
    .modal-overlay.open {
      opacity: 1;
      visibility: visible;
    }
    .search-modal {
      position: fixed;
      top: 0;
      left: 50%;
      transform: translateX(-50%) translateY(-100%);
      width: 100%;
      max-width: 480px;
      background: var(--surface);
      border-radius: 0 0 20px 20px;
      padding: 16px;
      padding-top: calc(16px + var(--safe-top));
      z-index: 101;
      transition: transform 0.3s ease-out;
    }
    .modal-overlay.open .search-modal {
      transform: translateX(-50%) translateY(0);
    }
    .search-input-wrap {
      position: relative;
      margin-bottom: 12px;
    }
    .search-input {
      width: 100%;
      padding: 14px 16px;
      padding-left: 44px;
      border: 2px solid var(--border);
      border-radius: 12px;
      font-size: 16px;
      background: var(--bg);
      color: var(--text);
      outline: none;
    }
    .search-input:focus {
      border-color: var(--primary);
    }
    .search-input-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 18px;
    }
    .search-close {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--border);
      border: none;
      border-radius: 50%;
      font-size: 18px;
      cursor: pointer;
    }
    .search-results {
      max-height: 300px;
      overflow-y: auto;
    }
    .search-result-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 12px;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .search-result-item:active {
      background: var(--bg);
    }
    .search-result-icon { font-size: 20px; }
    .search-result-text { flex: 1; }
    .search-result-name { font-size: 15px; font-weight: 500; }
    .search-result-sub { font-size: 13px; color: var(--text-secondary); }
    .search-geo-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 14px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 8px;
    }

    /* Loading & Error */
    .loading-state, .error-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      text-align: center;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-state {
      color: var(--error);
    }
    .error-icon { font-size: 48px; margin-bottom: 12px; }
    .error-text { font-size: 14px; }

    /* Pull to Refresh */
    .pull-indicator {
      position: fixed;
      top: calc(var(--safe-top) + 60px);
      left: 50%;
      transform: translateX(-50%) translateY(-100%);
      background: var(--primary);
      color: white;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
      z-index: 60;
      opacity: 0;
      transition: all 0.2s;
    }
    .pull-indicator.visible {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    /* Offline Banner */
    .offline-banner {
      position: fixed;
      bottom: calc(16px + var(--safe-bottom));
      left: 50%;
      transform: translateX(-50%);
      background: var(--warning);
      color: white;
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
      z-index: 60;
      display: none;
    }
    .offline-banner.visible { display: block; }

    /* Utility */
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="pull-indicator" id="pullIndicator">Refreshing...</div>
  <div class="offline-banner" id="offlineBanner">You're offline</div>

  <div class="app">
    <!-- Header -->
    <header class="header">
      <div class="header-location" id="headerLocation">
        <span class="header-location-icon">📍</span>
        <span class="header-location-text" id="headerLocationText">Loading...</span>
        <span class="header-location-arrow">▼</span>
      </div>
      <div class="header-actions">
        <button class="header-btn" id="refreshBtn" title="Refresh">🔄</button>
        <button class="header-btn" id="themeBtn" title="Theme">🌙</button>
      </div>
    </header>

    <!-- Main Content -->
    <main class="main" id="mainContent">
      <!-- Loading State -->
      <div class="loading-state" id="loadingState">
        <div class="spinner"></div>
        <div>Loading weather...</div>
      </div>

      <!-- Error State -->
      <div class="error-state hidden" id="errorState">
        <div class="error-icon">⚠️</div>
        <div class="error-text" id="errorText">Failed to load weather</div>
      </div>

      <!-- Weather Content -->
      <div class="weather-content hidden" id="weatherContent">
        <!-- Saved Locations Bar -->
        <div class="saved-bar" id="savedBar">
          <div class="saved-chip add-location-chip" id="addLocationBtn">+ Add</div>
        </div>

        <!-- Hero Card -->
        <div class="hero">
          <div class="hero-temp-row">
            <div class="hero-icon" id="heroIcon">🌤️</div>
            <div class="hero-temp" id="heroTemp">--°</div>
          </div>
          <div class="hero-condition" id="heroCondition">--</div>
          <div class="hero-highlow">
            <span class="high">H: <span id="heroHigh">--</span>°</span>
            <span class="low">L: <span id="heroLow">--</span>°</span>
          </div>
        </div>

        <!-- Quick Stats -->
        <div class="quick-stats">
          <div class="quick-stat">
            <div class="quick-stat-icon">💧</div>
            <div class="quick-stat-value" id="statHumidity">--%</div>
            <div class="quick-stat-label">Humidity</div>
          </div>
          <div class="quick-stat">
            <div class="quick-stat-icon">💨</div>
            <div class="quick-stat-value" id="statWind">-- m/s</div>
            <div class="quick-stat-label">Wind</div>
          </div>
          <div class="quick-stat">
            <div class="quick-stat-icon">🌧️</div>
            <div class="quick-stat-value" id="statPrecip">--%</div>
            <div class="quick-stat-label">Precip</div>
          </div>
        </div>

        <!-- Hourly Section -->
        <div class="section" id="hourlySection">
          <div class="section-header">
            <div class="section-title">Hourly Forecast</div>
            <div class="section-toggle">▼</div>
          </div>
          <div class="section-content">
            <div class="hourly-scroll" id="hourlyScroll"></div>
          </div>
        </div>

        <!-- Daily Section -->
        <div class="section" id="dailySection">
          <div class="section-header">
            <div class="section-title">7-Day Forecast</div>
            <div class="section-toggle">▼</div>
          </div>
          <div class="section-content">
            <div class="daily-list" id="dailyList"></div>
          </div>
        </div>

        <!-- Details Section -->
        <div class="section collapsed" id="detailsSection">
          <div class="section-header">
            <div class="section-title">Details</div>
            <div class="section-toggle">▼</div>
          </div>
          <div class="section-content">
            <div class="details-grid">
              <div class="detail-item">
                <div class="detail-label">Feels Like</div>
                <div class="detail-value" id="detailFeels">--°</div>
              </div>
              <div class="detail-item">
                <div class="detail-label">Pressure</div>
                <div class="detail-value" id="detailPressure">-- hPa</div>
              </div>
              <div class="detail-item">
                <div class="detail-label">Visibility</div>
                <div class="detail-value" id="detailVisibility">-- km</div>
              </div>
              <div class="detail-item">
                <div class="detail-label">UV Index</div>
                <div class="detail-value" id="detailUV">--</div>
              </div>
            </div>
          </div>
        </div>

        <!-- Footer Meta -->
        <div class="footer-meta">
          <span class="confidence-badge" id="confidenceBadge">
            <span id="confidenceValue">--</span>% confident
          </span>
          <span id="lastUpdated">Updated --</span>
        </div>
        <div class="footer-meta">
          <div class="sources-list" id="sourcesList"></div>
        </div>
      </div>
    </main>
  </div>

  <!-- Search Modal -->
  <div class="modal-overlay" id="searchModal">
    <div class="search-modal">
      <div class="search-input-wrap">
        <span class="search-input-icon">🔍</span>
        <input type="text" class="search-input" id="searchInput" placeholder="Search city..." autocomplete="off">
        <button class="search-close" id="searchClose">✕</button>
      </div>
      <div class="search-results" id="searchResults"></div>
      <button class="search-geo-btn" id="searchGeoBtn">
        <span>📍</span> Use Current Location
      </button>
    </div>
  </div>

  <script>
    // ==================== CONFIG ====================
    const STORAGE = {
      LOCATIONS: 'moe_locations',
      ACTIVE: 'moe_active_location',
      THEME: 'moe_theme'
    };
    const ICONS = {
      0:'☀️',1:'🌤️',2:'⛅',3:'☁️',45:'🌫️',48:'🌫️',
      51:'🌧️',53:'🌧️',55:'🌧️',56:'🌧️',57:'🌧️',
      61:'🌧️',63:'🌧️',65:'🌧️',66:'🌧️',67:'🌧️',
      71:'🌨️',73:'🌨️',75:'🌨️',77:'🌨️',
      80:'🌦️',81:'🌦️',82:'🌦️',85:'🌨️',86:'🌨️',
      95:'⛈️',96:'⛈️',99:'⛈️','-1':'❓'
    };
    const getIcon = (code) => ICONS[code] || ICONS['-1'];

    // ==================== STATE ====================
    let state = {
      locations: [],
      activeIndex: 0,
      weather: null,
      isOnline: navigator.onLine
    };

    // ==================== DOM ====================
    const $ = id => document.getElementById(id);
    const els = {
      headerLocation: $('headerLocation'),
      headerLocationText: $('headerLocationText'),
      refreshBtn: $('refreshBtn'),
      themeBtn: $('themeBtn'),
      mainContent: $('mainContent'),
      loadingState: $('loadingState'),
      errorState: $('errorState'),
      errorText: $('errorText'),
      weatherContent: $('weatherContent'),
      savedBar: $('savedBar'),
      addLocationBtn: $('addLocationBtn'),
      heroIcon: $('heroIcon'),
      heroTemp: $('heroTemp'),
      heroCondition: $('heroCondition'),
      heroHigh: $('heroHigh'),
      heroLow: $('heroLow'),
      statHumidity: $('statHumidity'),
      statWind: $('statWind'),
      statPrecip: $('statPrecip'),
      hourlyScroll: $('hourlyScroll'),
      dailyList: $('dailyList'),
      detailFeels: $('detailFeels'),
      detailPressure: $('detailPressure'),
      detailVisibility: $('detailVisibility'),
      detailUV: $('detailUV'),
      confidenceValue: $('confidenceValue'),
      lastUpdated: $('lastUpdated'),
      sourcesList: $('sourcesList'),
      searchModal: $('searchModal'),
      searchInput: $('searchInput'),
      searchClose: $('searchClose'),
      searchResults: $('searchResults'),
      searchGeoBtn: $('searchGeoBtn'),
      pullIndicator: $('pullIndicator'),
      offlineBanner: $('offlineBanner')
    };

    // ==================== STORAGE ====================
    function loadLocations() {
      try {
        const saved = localStorage.getItem(STORAGE.LOCATIONS);
        state.locations = saved ? JSON.parse(saved) : [];
        state.activeIndex = parseInt(localStorage.getItem(STORAGE.ACTIVE) || '0');
        if (state.activeIndex >= state.locations.length) state.activeIndex = 0;
      } catch (e) {
        state.locations = [];
        state.activeIndex = 0;
      }
    }

    function saveLocations() {
      localStorage.setItem(STORAGE.LOCATIONS, JSON.stringify(state.locations));
      localStorage.setItem(STORAGE.ACTIVE, state.activeIndex.toString());
    }

    function addLocation(loc) {
      const exists = state.locations.some(l =>
        Math.abs(l.lat - loc.lat) < 0.01 && Math.abs(l.lon - loc.lon) < 0.01
      );
      if (!exists) {
        state.locations.push(loc);
        if (state.locations.length > 8) state.locations.shift();
        state.activeIndex = state.locations.length - 1;
        saveLocations();
      } else {
        state.activeIndex = state.locations.findIndex(l =>
          Math.abs(l.lat - loc.lat) < 0.01 && Math.abs(l.lon - loc.lon) < 0.01
        );
        saveLocations();
      }
      renderSavedBar();
    }

    function removeLocation(index) {
      state.locations.splice(index, 1);
      if (state.activeIndex >= state.locations.length) {
        state.activeIndex = Math.max(0, state.locations.length - 1);
      }
      saveLocations();
      renderSavedBar();
      if (state.locations.length > 0) {
        fetchWeatherForActive();
      }
    }

    function setActiveLocation(index) {
      state.activeIndex = index;
      saveLocations();
      renderSavedBar();
      fetchWeatherForActive();
    }

    // ==================== THEME ====================
    function loadTheme() {
      const saved = localStorage.getItem(STORAGE.THEME);
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const theme = saved || (prefersDark ? 'dark' : 'light');
      setTheme(theme);
    }

    function setTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      localStorage.setItem(STORAGE.THEME, theme);
      els.themeBtn.textContent = theme === 'dark' ? '☀️' : '🌙';
    }

    function toggleTheme() {
      const current = document.documentElement.getAttribute('data-theme');
      setTheme(current === 'dark' ? 'light' : 'dark');
    }

    // ==================== UI RENDER ====================
    function showLoading() {
      els.loadingState.classList.remove('hidden');
      els.errorState.classList.add('hidden');
      els.weatherContent.classList.add('hidden');
    }

    function showError(msg) {
      els.loadingState.classList.add('hidden');
      els.errorState.classList.remove('hidden');
      els.weatherContent.classList.add('hidden');
      els.errorText.textContent = msg;
    }

    function showWeather() {
      els.loadingState.classList.add('hidden');
      els.errorState.classList.add('hidden');
      els.weatherContent.classList.remove('hidden');
    }

    function renderSavedBar() {
      const chips = state.locations.map((loc, i) => `
        <div class="saved-chip ${i === state.activeIndex ? 'active' : ''}" data-index="${i}">
          ${loc.name.split(',')[0]}
        </div>
      `).join('');
      els.savedBar.innerHTML = chips + `<div class="saved-chip add-location-chip" id="addLocationBtn">+ Add</div>`;

      // Re-attach event listeners
      els.savedBar.querySelectorAll('.saved-chip[data-index]').forEach(chip => {
        chip.addEventListener('click', () => setActiveLocation(parseInt(chip.dataset.index)));
      });
      $('addLocationBtn').addEventListener('click', openSearch);
    }

    function renderWeather(data) {
      const loc = state.locations[state.activeIndex];
      els.headerLocationText.textContent = loc ? loc.name : 'Unknown';

      // Hero
      els.heroIcon.textContent = getIcon(data.current.weatherCode);
      els.heroTemp.textContent = Math.round(data.current.temperature) + '°';
      els.heroCondition.textContent = data.current.weatherDescription;

      // High/Low from daily
      if (data.daily && data.daily.length > 0) {
        els.heroHigh.textContent = Math.round(data.daily[0].temperatureMax);
        els.heroLow.textContent = Math.round(data.daily[0].temperatureMin);
      }

      // Quick Stats
      els.statHumidity.textContent = data.current.humidity + '%';
      els.statWind.textContent = data.current.windSpeed.toFixed(1) + ' m/s';
      // Precipitation chance from hourly
      const precipChance = data.hourly && data.hourly[0] ? (data.hourly[0].precipitationProbability || 0) : 0;
      els.statPrecip.textContent = precipChance + '%';

      // Hourly
      els.hourlyScroll.innerHTML = data.hourly.slice(0, 24).map(h => {
        const time = new Date(h.time);
        const hour = time.getHours();
        const label = hour === 0 ? '12am' : hour === 12 ? '12pm' : hour > 12 ? (hour-12)+'pm' : hour+'am';
        return `
          <div class="hourly-item">
            <div class="hourly-time">${label}</div>
            <div class="hourly-icon">${getIcon(h.weatherCode)}</div>
            <div class="hourly-temp">${Math.round(h.temperature)}°</div>
          </div>
        `;
      }).join('');

      // Daily
      const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
      els.dailyList.innerHTML = data.daily.map((d, i) => {
        const date = new Date(d.date);
        const dayName = i === 0 ? 'Today' : i === 1 ? 'Tomorrow' : days[date.getDay()];
        return `
          <div class="daily-item">
            <div class="daily-day">${dayName}</div>
            <div class="daily-icon">${getIcon(d.weatherCode)}</div>
            <div class="daily-temps">
              <span class="daily-high">${Math.round(d.temperatureMax)}°</span>
              <span class="daily-low">${Math.round(d.temperatureMin)}°</span>
            </div>
          </div>
        `;
      }).join('');

      // Details
      els.detailFeels.textContent = Math.round(data.current.feelsLike) + '°';
      els.detailPressure.textContent = data.current.pressure + ' hPa';
      els.detailVisibility.textContent = (data.current.visibility / 1000).toFixed(0) + ' km';
      els.detailUV.textContent = data.current.uvIndex ?? '--';

      // Meta
      const confidence = Math.round(data.metadata.confidence.overall * 100);
      els.confidenceValue.textContent = confidence;
      els.lastUpdated.textContent = 'Updated ' + new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
      els.sourcesList.innerHTML = data.metadata.sources.map(s =>
        `<span class="source-tag">${s.name}</span>`
      ).join('');

      showWeather();
    }

    // ==================== API ====================
    async function fetchWeather(lat, lon) {
      showLoading();
      try {
        const res = await fetch(`/api/weather?lat=${lat}&lon=${lon}`);
        if (!res.ok) throw new Error('Failed to fetch weather');
        const data = await res.json();
        state.weather = data;
        renderWeather(data);
      } catch (e) {
        showError(e.message);
      }
    }

    function fetchWeatherForActive() {
      const loc = state.locations[state.activeIndex];
      if (loc) {
        fetchWeather(loc.lat, loc.lon);
      }
    }

    async function searchCity(query) {
      if (query.length < 2) {
        els.searchResults.innerHTML = '';
        return;
      }
      try {
        const res = await fetch(`/api/geocode?q=${encodeURIComponent(query)}`);
        const results = await res.json();
        if (!results || results.length === 0) {
          els.searchResults.innerHTML = '<div class="search-result-item"><span>No results found</span></div>';
          return;
        }
        els.searchResults.innerHTML = results.map((r, i) => `
          <div class="search-result-item" data-index="${i}">
            <span class="search-result-icon">📍</span>
            <div class="search-result-text">
              <div class="search-result-name">${r.name}</div>
              <div class="search-result-sub">${r.state ? r.state + ', ' : ''}${r.country}</div>
            </div>
          </div>
        `).join('');

        els.searchResults.querySelectorAll('.search-result-item').forEach((item, i) => {
          item.addEventListener('click', () => {
            const r = results[i];
            addLocation({
              name: `${r.name}, ${r.country}`,
              lat: r.latitude,
              lon: r.longitude
            });
            closeSearch();
            fetchWeatherForActive();
          });
        });
      } catch (e) {
        els.searchResults.innerHTML = '<div class="search-result-item"><span>Search failed</span></div>';
      }
    }

    function getCurrentLocation() {
      if (!navigator.geolocation) {
        showError('Geolocation not supported');
        return;
      }
      showLoading();
      navigator.geolocation.getCurrentPosition(
        pos => {
          addLocation({
            name: 'Current Location',
            lat: pos.coords.latitude,
            lon: pos.coords.longitude
          });
          closeSearch();
          fetchWeatherForActive();
        },
        err => {
          showError('Could not get location');
        },
        { timeout: 10000 }
      );
    }

    // ==================== SEARCH MODAL ====================
    function openSearch() {
      els.searchModal.classList.add('open');
      els.searchInput.value = '';
      els.searchResults.innerHTML = '';
      setTimeout(() => els.searchInput.focus(), 100);
    }

    function closeSearch() {
      els.searchModal.classList.remove('open');
      els.searchInput.blur();
    }

    // ==================== SECTIONS ====================
    function initSections() {
      document.querySelectorAll('.section-header').forEach(header => {
        header.addEventListener('click', () => {
          header.parentElement.classList.toggle('collapsed');
        });
      });
    }

    // ==================== PULL TO REFRESH ====================
    let pullStartY = 0;
    let isPulling = false;

    function initPullToRefresh() {
      const main = els.mainContent;

      main.addEventListener('touchstart', e => {
        if (main.scrollTop === 0) {
          pullStartY = e.touches[0].clientY;
          isPulling = true;
        }
      }, { passive: true });

      main.addEventListener('touchmove', e => {
        if (!isPulling) return;
        const pullDistance = e.touches[0].clientY - pullStartY;
        if (pullDistance > 60 && main.scrollTop === 0) {
          els.pullIndicator.classList.add('visible');
        }
      }, { passive: true });

      main.addEventListener('touchend', () => {
        if (els.pullIndicator.classList.contains('visible')) {
          fetchWeatherForActive();
          setTimeout(() => els.pullIndicator.classList.remove('visible'), 1000);
        }
        isPulling = false;
      });
    }

    // ==================== EVENTS ====================
    function initEvents() {
      els.headerLocation.addEventListener('click', openSearch);
      els.refreshBtn.addEventListener('click', fetchWeatherForActive);
      els.themeBtn.addEventListener('click', toggleTheme);
      els.searchClose.addEventListener('click', closeSearch);
      els.searchModal.addEventListener('click', e => {
        if (e.target === els.searchModal) closeSearch();
      });
      els.searchGeoBtn.addEventListener('click', getCurrentLocation);

      let searchTimeout;
      els.searchInput.addEventListener('input', e => {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => searchCity(e.target.value), 300);
      });

      window.addEventListener('online', () => {
        state.isOnline = true;
        els.offlineBanner.classList.remove('visible');
        fetchWeatherForActive();
      });
      window.addEventListener('offline', () => {
        state.isOnline = false;
        els.offlineBanner.classList.add('visible');
      });
    }

    // ==================== SERVICE WORKER ====================
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }

    // ==================== INIT ====================
    function init() {
      loadTheme();
      loadLocations();
      renderSavedBar();
      initSections();
      initEvents();
      initPullToRefresh();

      if (!navigator.onLine) {
        els.offlineBanner.classList.add('visible');
      }

      if (state.locations.length > 0) {
        fetchWeatherForActive();
      } else {
        getCurrentLocation();
      }
    }

    init();
  </script>
</body>
</html>
