name: PR Checks

on:
  pull_request:
    branches: [master]

jobs:
  validate-branch-name:
    name: Validate Branch Name
    runs-on: ubuntu-latest
    steps:
      - name: Check branch naming convention
        run: |
          BRANCH="${{ github.head_ref }}"
          if [[ "$BRANCH" =~ ^(wave[0-9]+/|feature/|fix/|chore/) ]]; then
            echo "✓ Branch name valid: $BRANCH"
          else
            echo "✗ Branch must start with wave{N}/, feature/, fix/, or chore/"
            exit 1
          fi

  check-no-console-log:
    name: No console.log
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fail if console.log found in src/
        run: |
          if grep -r "console\.log\|console\.warn\|console\.error" src/ --include="*.ts" --exclude-dir=__tests__; then
            echo "✗ console.log found — use structured logger from src/lib/logger.ts"
            exit 1
          fi
          echo "✓ No console.log in src/"
